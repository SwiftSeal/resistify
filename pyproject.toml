[project]
name = "resistify"
version = "2.0.0"
dependencies = [
    "einops>=0.8.1",
    "pyhmmer>=0.11.1",
    "sentencepiece>=0.2.0",
    "torch>=2.7.1",
    "transformers>=4.53.2",
    "peft>=0.17.0",
    "typer>=0.16.0",
    "rich>=14.1.0",
]
authors = [
  { name="Moray Smith", email="moraysmith98@gmail.com" },
]
description = "A resistance gene annotation tool"
readme = "README.md"
requires-python = ">=3.13"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
    "Operating System :: OS Independent",
]

[project.scripts]
resistify = "resistify.main:app"
update_pfam_db = "resistify.hmmer:app"

[build-system]
requires = ["uv_build>=0.8.9,<0.9.0"]
build-backend = "uv_build"
